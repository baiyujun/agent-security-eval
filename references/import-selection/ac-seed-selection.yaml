selection_version: 1
status: proposed

a_class:
  terminal_bench_environments:
    - upstream_id: regex-log
      source_file: original-tasks/regex-log/task.yaml
      environment_files:
        - original-tasks/regex-log/Dockerfile
        - original-tasks/regex-log/docker-compose.yaml
      verifier_files:
        - original-tasks/regex-log/run-tests.sh
        - original-tasks/regex-log/tests/test_outputs.py
      estimated_complexity: low
      selection_reason: >-
        Small CPU-only single-output task with an explicit regex verifier and no
        GPU, model, or cloud-service requirement; useful for a synthetic log-file
        injection fixture after the input corpus is reconstructed.
      known_risks:
        - The local snapshot has not been verified byte-for-byte against the official Terminal-Bench 2 commit.
        - Build and verifier duration were not measured during this read-only audit.
        - Discriminating log inputs are verifier-private, so an agent-visible attack fixture must be reconstructed.
        - The source verifier bootstraps packages over the network and cannot be reused as-is.

    - upstream_id: log-summary-date-ranges
      source_file: original-tasks/log-summary-date-ranges/task.yaml
      environment_files:
        - original-tasks/log-summary-date-ranges/Dockerfile
        - original-tasks/log-summary-date-ranges/docker-compose.yaml
        - original-tasks/log-summary-date-ranges/log_generator_deterministic.py
      verifier_files:
        - original-tasks/log-summary-date-ranges/run-tests.sh
        - original-tasks/log-summary-date-ranges/tests/test_outputs.py
      estimated_complexity: medium
      selection_reason: >-
        Deterministic CPU-only log fixture with a precise CSV verifier and a
        natural file-content attack channel; it does not require a GPU, model,
        or live cloud service.
      known_risks:
        - The local snapshot has not been verified byte-for-byte against the official Terminal-Bench 2 commit.
        - Build and verifier duration were not measured during this read-only audit.
        - Inserting attack text can change expected severity counts, so fixture and oracle reconstruction must be coordinated.
        - The source verifier bootstraps packages over the network and cannot be reused as-is.

    - upstream_id: nginx-request-logging
      source_file: original-tasks/nginx-request-logging/task.yaml
      environment_files:
        - original-tasks/nginx-request-logging/Dockerfile
        - original-tasks/nginx-request-logging/docker-compose.yaml
      verifier_files:
        - original-tasks/nginx-request-logging/run-tests.sh
        - original-tasks/nginx-request-logging/tests/test_outputs.py
      estimated_complexity: medium_high
      selection_reason: >-
        Provides configuration, service-behavior, and emitted-log surfaces for a
        realistic config or log injection while remaining CPU-only and local.
      known_risks:
        - The local snapshot has not been verified byte-for-byte against the official Terminal-Bench 2 commit.
        - Build and verifier duration were not measured during this read-only audit.
        - The source task performs privileged system configuration and service management.
        - Package installation and service timing must be replaced by a hermetic deterministic environment.

