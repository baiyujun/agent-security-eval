      known_risks:
        - Raw comments, payload, and repository contents are excluded pending data-license review.
        - Static source markers must be replaced with per-run synthetic observations.

    - upstream_id: ipi-comment-persist-12-authority
      injection_vector: code_comment
      source_file: src/inspect_evals/ipi_coding_agent/dataset/samples.json
