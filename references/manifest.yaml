# Each candidate capability has exactly one verified reuse classification at the fixed commit.
references:
  - name: promptfoo
    repository: https://github.com/promptfoo/promptfoo
    default_branch: main
    commit: fcde2e89a89dc4ca79dcc3012927f50193251759
    latest_stable_release: "0.121.19"
    audit_date: "2026-07-16"
    classification_status: verified-at-fixed-commit
    reuse_candidates:
      - capability: standalone candidate-generation CLI
        classification: ADAPTER_REUSE
      - capability: target-calling adaptive providers and evaluation runtime
        classification: REJECT
    role: attack candidate generator
    first_version_decision: revalidate a stable release, then allowlist standalone generation only
    license: MIT
    license_evidence: [LICENSE]
    commercial_use: permitted-with-license-notice
    license_caveats:
      - Generated-output provenance and any remote-service terms require separate review.
      - Local or self-hosted generation must be explicit because remote generation can be the default.
      - Email validation and the local probe gate must be tested at the selected CLI release.
    copied_files: []

